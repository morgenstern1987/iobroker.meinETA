<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="../../css/adapter.css">
    <link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css">
    <script src="../../lib/js/jquery-3.2.1.min.js"></script>
    <script src="../../socket.io/socket.io.js"></script>
    <script src="../../lib/js/materialize.js"></script>
    <script src="../../lib/js/adapter-settings.js"></script>
    <style>
        .group-list        { max-height: 320px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; padding: 8px; margin-top: 8px; }
        .group-item        { padding: 4px 8px; }
        .group-item label  { cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .group-item input  { width: 18px; height: 18px; cursor: pointer; }
        .status-msg        { font-size: 13px; color: #888; margin-top: 6px; min-height: 20px; }
        .status-msg.error  { color: #c00; }
        .status-msg.ok     { color: #2a7; }
        h6                 { margin-top: 24px; margin-bottom: 4px; font-weight: 500; font-size: 15px; }
    </style>
</head>
<body>
<div class="m adapter-container">

    <div class="row">
        <div class="col s12 m6">
            <div class="input-field">
                <input type="text" id="ip" placeholder="192.168.1.100">
                <label for="ip">IP-Adresse des ETAtouch</label>
            </div>
        </div>
        <div class="col s12 m3">
            <div class="input-field">
                <input type="number" id="port" min="1" max="65535" value="8080">
                <label for="port">Port</label>
            </div>
        </div>
        <div class="col s12 m3">
            <div class="input-field">
                <input type="number" id="pollInterval" min="10" max="3600" value="60">
                <label for="pollInterval">Abfrage-Intervall (Sekunden)</label>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col s12">
            <h6>Objektgruppen auswählen</h6>
            <p style="font-size:13px;color:#666;margin:4px 0 10px;">
                Klicke auf "Gruppen laden", um alle verfügbaren Gruppen vom ETAtouch abzurufen.
                Wähle dann aus, welche Gruppen regelmäßig abgefragt werden sollen.
            </p>
            <button class="btn btn-small waves-effect" id="btnLoadGroups" onclick="loadGroups()">
                Gruppen laden
            </button>
            <div class="status-msg" id="statusMsg"></div>
            <div class="group-list" id="groupList" style="display:none;"></div>
        </div>
    </div>

</div>

<script>
    // ── ioBroker adapter-settings API ────────────────────────────────────────
    function load(settings, onChange) {
        if (!settings) return;

        $('#ip').val(settings.ip || '').on('change', onChange);
        $('#port').val(settings.port || 8080).on('change', onChange);
        $('#pollInterval').val(settings.pollInterval || 60).on('change', onChange);

        // re-init Materialize labels so they don't overlap
        M.updateTextFields();

        // remember saved groups so we can re-check them after loading
        window._savedGroups = settings.selectedGroups || [];

        // auto-load groups if IP is already configured
        if (settings.ip) {
            loadGroups();
        }
    }

    function save(callback) {
        var obj = {
            ip:             $('#ip').val().trim(),
            port:           parseInt($('#port').val()) || 8080,
            pollInterval:   parseInt($('#pollInterval').val()) || 60,
            selectedGroups: getCheckedGroups()
        };
        callback(obj);
    }

    // ── group loading ─────────────────────────────────────────────────────────
    function setStatus(msg, cls) {
        $('#statusMsg').removeClass('error ok').addClass(cls || '').text(msg);
    }

    function loadGroups() {
        var ip   = $('#ip').val().trim();
        var port = parseInt($('#port').val()) || 8080;

        if (!ip) {
            setStatus('Bitte zuerst eine IP-Adresse eingeben.', 'error');
            return;
        }

        setStatus('Lade Gruppen vom ETAtouch …');
        $('#btnLoadGroups').prop('disabled', true);
        $('#groupList').hide();

        // sendTo the running adapter instance
        socket.emit('sendTo', adapter + '.' + instance, 'getGroups', { ip: ip, port: port }, function(result) {
            $('#btnLoadGroups').prop('disabled', false);

            if (!result || result.error) {
                setStatus('Fehler: ' + (result ? result.error : 'Keine Antwort vom Adapter. Ist die Instanz gestartet?'), 'error');
                return;
            }

            if (!result.groups || !result.groups.length) {
                setStatus('Keine Gruppen gefunden.', 'error');
                return;
            }

            renderGroups(result.groups);
            setStatus('✓ ' + result.groups.length + ' Gruppen geladen.', 'ok');
        });
    }

    function renderGroups(groups) {
        var saved  = window._savedGroups || [];
        var $list  = $('#groupList').empty();

        groups.forEach(function(g) {
            var checked = saved.indexOf(g.value) !== -1 ? 'checked' : '';
            $list.append(
                '<div class="group-item">' +
                  '<label>' +
                    '<input type="checkbox" class="group-cb" value="' + escHtml(g.value) + '" ' + checked + '> ' +
                    escHtml(g.label) +
                  '</label>' +
                '</div>'
            );
        });

        // trigger onChange so the Save button activates
        $list.find('input').on('change', function() {
            if (typeof onChange === 'function') onChange();
        });

        $list.show();
    }

    function getCheckedGroups() {
        var result = [];
        $('.group-cb:checked').each(function() {
            result.push($(this).val());
        });
        return result;
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
